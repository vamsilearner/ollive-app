services:
  postgres:
    image: postgres:16-alpine
    container_name: ollive-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ollive
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  adminer:
    image: adminer:latest
    container_name: ollive-adminer
    ports:
      - "8080:8080"
    depends_on:
      - postgres

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollive-app
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/ollive
      GEMINI_API_KEY: AIzaSyD1jDWnOPsrtW1MJi3jG_duxcLVA3qRYSw
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY}
      DEFAULT_PROVIDER: gemini
      DEFAULT_MODEL: gemini-2.0-flash
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data:
